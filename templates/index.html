<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Busca de CEPs por logradouros (SFS)</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; }
        .resultado { background-color: #f3f3f3; border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; }
        .cep { font-weight: bold; color: darkblue; }
    </style>
</head>
<body>
    <h1>Busca de CEPs por logradouros (SFS)</h1>
    <input type="text" id="inputRua" placeholder="Digite o nome da rua (ex: barao)" style="width: 70%; padding: 8px;">
    <button onclick="buscar()">Buscar</button>

    <div id="resultados">
        </div>

    <script>
        function buscar() {
            const inputRua = document.getElementById('inputRua').value;
            const resultadosDiv = document.getElementById('resultados');
            resultadosDiv.innerHTML = 'Buscando...';

            if (!inputRua) {
                resultadosDiv.innerHTML = '<p>Por favor, digite o nome ou parte do logradouro.</p>';
                return;
            }

            // Chama a API que criamos no Flask
            fetch(`/api/search?rua=${encodeURIComponent(inputRua)}`)
                .then(response => response.json())
                .then(data => {
                    resultadosDiv.innerHTML = '';

                    if (data.error) {
                         resultadosDiv.innerHTML = `<p style="color: red;">Erro: ${data.error}</p>`;
                         return;
                    }

                    if (data.length === 0) {
                        resultadosDiv.innerHTML = `<p>Nenhum CEP encontrado para "${inputRua}".</p>`;
                    } else {
                        data.forEach(item => {
                            const div = document.createElement('div');
                            div.className = 'resultado';
                            div.innerHTML = `
                                <span class="cep">CEP: ${item.cep_formatado}</span><br>
                                ${item.logradouro}<br>
                                Bairro: ${item.bairro}
                            `;
                            resultadosDiv.appendChild(div);
                        });
                    }
                })
                .catch(error => {
                    console.error('Erro na requisição:', error);
                    resultadosDiv.innerHTML = '<p style="color: red;">Erro ao se comunicar com o servidor.</p>';
                });
        }
    </script>
</body>
</html>
